<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Email — Operator</title>
    <script>
      // Pre-paint theme — prevents flash-of-wrong-theme. Reads the same
      // localStorage key the framework's ThemeProvider writes.
      (function () {
        try {
          var v = localStorage.getItem('bos:theme') || 'system';
          var dark =
            v === 'dark' ||
            (v === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
