services:
  postgres:
    image: postgres:16-alpine
    container_name: businessos-postgres
    environment:
      POSTGRES_USER: businessos
      POSTGRES_PASSWORD: businessos
      POSTGRES_DB: businessos_dev
    ports:
      # Host port 4732 → container 5432. Off-default to avoid colliding
      # with native Postgres installs and other dev-time Postgres containers.
      - "4732:5432"
    volumes:
      - businessos-pgdata:/var/lib/postgresql/data

volumes:
  businessos-pgdata:
